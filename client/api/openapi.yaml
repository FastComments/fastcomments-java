openapi: 3.0.0
info:
  contact: {}
  title: fastcomments
  version: 0.0.0
servers:
- url: https://fastcomments.com/
- url: https://eu.fastcomments.com/
paths:
  /user-search/{tenantId}:
    get:
      operationId: SearchUsers
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: usernameStartsWith
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: mentionGroupIds
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: searchSection
        required: false
        schema:
          enum:
          - fast
          - site
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUsersResult"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-presence-status:
    get:
      operationId: GetUserPresenceStatuses
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: urlIdWS
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: userIds
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserPresenceStatusesResponse"
          description: Ok
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Validation Failed
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-notifications:
    get:
      operationId: GetUserNotifications
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - description: Used to determine whether the current page is subscribed.
        explode: true
        in: query
        name: urlId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: pageSize
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - explode: true
        in: query
        name: afterId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: includeContext
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: afterCreatedAt
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - explode: true
        in: query
        name: unreadOnly
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: dmOnly
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: noDm
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: includeTranslations
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: includeTenantNotifications
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMyNotificationsResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-notifications/reset:
    post:
      operationId: ResetUserNotifications
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: afterId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: afterCreatedAt
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - explode: true
        in: query
        name: unreadOnly
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: dmOnly
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: noDm
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetUserNotificationsResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-notifications/get-count:
    get:
      operationId: GetUserNotificationCount
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserNotificationCountResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-notifications/reset-count:
    post:
      operationId: ResetUserNotificationCount
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetUserNotificationsResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-notifications/{notificationId}/mark/{newStatus}:
    post:
      operationId: UpdateUserNotificationStatus
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - explode: false
        in: path
        name: notificationId
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: newStatus
        required: true
        schema:
          enum:
          - read
          - unread
          type: string
        style: simple
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserNotificationStatusResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-notifications/{notificationId}/mark-opted/{optedInOrOut}:
    post:
      description: Enable or disable notifications for a specific comment.
      operationId: UpdateUserNotificationCommentSubscriptionStatus
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - explode: false
        in: path
        name: notificationId
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: optedInOrOut
        required: true
        schema:
          enum:
          - in
          - out
          type: string
        style: simple
      - explode: true
        in: query
        name: commentId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserNotificationCommentSubscriptionStatusResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /user-notifications/set-subscription-state/{subscribedOrUnsubscribed}:
    post:
      description: |-
        Enable or disable notifications for a page. When users are subscribed to a page, notifications are created
        for new root comments, and also
      operationId: UpdateUserNotificationPageSubscriptionStatus
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: url
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: pageTitle
        required: true
        schema:
          type: string
        style: form
      - explode: false
        in: path
        name: subscribedOrUnsubscribed
        required: true
        schema:
          enum:
          - subscribe
          - unsubscribe
          type: string
        style: simple
      - explode: true
        in: query
        name: sso
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserNotificationPageSubscriptionStatusResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /upload-image/{tenantId}:
    post:
      description: Upload and resize an image
      operationId: UploadImage
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - description: "Size preset: \"Default\" (1000x1000px) or \"CrossPlatform\"\
          \ (creates sizes for popular devices)"
        explode: true
        in: query
        name: sizePreset
        required: false
        schema:
          $ref: "#/components/schemas/SizePreset"
        style: form
      - description: "Page id that upload is happening from, to configure"
        explode: true
        in: query
        name: urlId
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadImage_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImageResponse"
          description: Ok
      security: []
      tags:
      - Public
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /translations/{namespace}/{component}:
    get:
      operationId: GetTranslations
      parameters:
      - explode: false
        in: path
        name: namespace
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: component
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: locale
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: useFullTranslationIds
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTranslationsResponse"
          description: Ok
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Validation Failed
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Internal
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /pages/{tenantId}:
    get:
      description: |-
        List pages for a tenant. Used by the FChat desktop client to populate its room list.
        Requires `enableFChat` to be true on the resolved custom config for each page.
        Pages that require SSO are filtered against the requesting user's group access.
      operationId: GetPagesPublic
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - description: Opaque pagination cursor returned as `nextCursor` from a prior
          request. Tied to the same `sortBy`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: "1..200, default 50"
        explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - description: Optional case-insensitive title prefix filter.
        explode: true
        in: query
        name: q
        required: false
        schema:
          type: string
        style: form
      - description: "Sort order. `updatedAt` (default, newest first), `commentCount`\
          \ (most comments first), or `title` (alphabetical)."
        explode: true
        in: query
        name: sortBy
        required: false
        schema:
          $ref: "#/components/schemas/PagesSortBy"
        style: form
      - description: "If true, only return pages with at least one comment."
        explode: true
        in: query
        name: hasComments
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPublicPagesResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /pages/{tenantId}/users/online:
    get:
      description: |-
        Currently-online viewers of a page: people whose websocket session is subscribed to the page right now.
        Returns anonCount + totalCount (room-wide subscribers, including anon viewers we don't enumerate).
      operationId: GetOnlineUsers
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - description: Page URL identifier (cleaned server-side).
        explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      - description: "Cursor: pass nextAfterName from the previous response."
        explode: true
        in: query
        name: afterName
        required: false
        schema:
          type: string
        style: form
      - description: "Cursor tiebreaker: pass nextAfterUserId from the previous response.\
          \ Required when afterName is set so name-ties don't drop entries."
        explode: true
        in: query
        name: afterUserId
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageUsersOnlineResponse"
          description: Ok
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Forbidden
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Validation Failed
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /pages/{tenantId}/users/offline:
    get:
      description: |-
        Past commenters on the page who are NOT currently online. Sorted by displayName.
        Use this after exhausting /users/online to render a "Members" section.
        Cursor pagination on commenterName: server walks the partial {tenantId, urlId, commenterName}
        index from afterName forward via $gt, no $skip cost.
      operationId: GetOfflineUsers
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - description: Page URL identifier (cleaned server-side).
        explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      - description: "Cursor: pass nextAfterName from the previous response."
        explode: true
        in: query
        name: afterName
        required: false
        schema:
          type: string
        style: form
      - description: "Cursor tiebreaker: pass nextAfterUserId from the previous response.\
          \ Required when afterName is set so name-ties don't drop entries."
        explode: true
        in: query
        name: afterUserId
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageUsersOfflineResponse"
          description: Ok
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Forbidden
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Validation Failed
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /pages/{tenantId}/users/info:
    get:
      description: |-
        Bulk user info for a tenant. Given userIds, return display info from User / SSOUser.
        Used by the comment widget to enrich users that just appeared via a presence event.
        No page context: privacy is enforced uniformly (private profiles are masked).
      operationId: GetUsersInfo
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - description: Comma-delimited userIds.
        explode: true
        in: query
        name: ids
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageUsersInfoResponse"
          description: Ok
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Validation Failed
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /page-reacts/v1/likes/{tenantId}:
    delete:
      operationId: DeleteV1PageReact
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteV1PageReact"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
    get:
      operationId: GetV1PageLikes
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetV1PageLikes"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
    post:
      operationId: CreateV1PageReact
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: title
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateV1PageReact"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /page-reacts/v2/{tenantId}/list:
    get:
      operationId: GetV2PageReactUsers
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: id
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetV2PageReactUsersResponse"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
  /page-reacts/v2/{tenantId}:
    delete:
      operationId: DeleteV2PageReact
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: urlId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: id
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteV2PageReact"
          description: Ok
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security: []
      tags:
      - Public
      x-accepts:
      - application/json
    get:
      operationId: GetV2PageReacts
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: urlId
